<div class="gamesessionslist">
<div class="w3-content w3-container w3-padding-32">
            <!-- s12: 100% su mobile (12/12) -->
            <!-- m10: ~83% su tablet, l8: ~66% su PC -->
            <!-- Usiamo il margine auto per centrare la colonna quando non occupa 12/12 -->
            <div class="w3-col s12 m10 l8" style="float:none;margin:auto;">
                <app-game-session-preview></app-game-session-preview>
                 @for (gameSession of gameSessions(); track gameSession.id){
                    <app-game-session-preview [gameSession]="gameSession"></app-game-session-preview>
                 }
            </div>
    </div>
</div>
